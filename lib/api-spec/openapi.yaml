openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: homophones
    description: Cross-lingual acoustic homophone discovery
  - name: reservoir
    description: Persistent EN↔FR homophone reservoir (mined corpus + tier grading)
  - name: flit
    description: Flit lab — meaning-preserving cross-lingual sound-alike rendering
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /homophones/discover:
    post:
      operationId: discoverHomophones
      tags: [homophones]
      summary: Discover acoustic homophones for a phrase
      description: |
        Given a source phrase in any language, finds phrases in other languages
        whose synthesized audio is acoustically near-identical (measured via
        MFCC + Dynamic Time Warping on actual TTS audio — not text or IPA).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoverRequest"
      responses:
        "200":
          description: Acoustic homophone discovery result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverResponse"

  /homophones/tts:
    post:
      operationId: synthesizeSpeech
      tags: [homophones]
      summary: Generate TTS audio for a phrase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TtsRequest"
      responses:
        "200":
          description: Audio data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TtsResponse"

  /homophones/compare:
    post:
      operationId: comparePhrases
      tags: [homophones]
      summary: Compare two phrases acoustically
      description: |
        Synthesizes both phrases via TTS and compares them with MFCC + DTW.
        Returns audio for both, waveforms, mel-spectrograms, and the acoustic
        similarity score.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompareRequest"
      responses:
        "200":
          description: Acoustic comparison result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompareResponse"

  /homophones/methods:
    get:
      operationId: getScoringMethods
      tags: [homophones]
      summary: List acoustic similarity scoring methods
      description: |
        Each method is a different "judge" that scores how similar two audio
        clips sound. Methods can be selected per request via `scoringMethod`.
      responses:
        "200":
          description: Available scoring methods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScoringMethodInfo"

  /homophones/translate:
    post:
      operationId: translatePassage
      tags: [homophones]
      summary: Semantic + homophonic translation of a passage
      description: |
        Splits the passage into sentence-sized chunks. For each chunk, generates
        both a literal SEMANTIC translation in the target language and a
        HOMOPHONIC rendering — a real-target-language phrase whose synthesized
        audio sounds like the source chunk. Each homophonic candidate is
        verified with MFCC + DTW against the source TTS audio.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslatePassageRequest"
      responses:
        "200":
          description: Per-chunk semantic + homophonic translations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslatedPassage"

  /homophones/saved:
    get:
      operationId: getSavedPairs
      tags: [homophones]
      summary: Get saved homophone pairs
      responses:
        "200":
          description: Saved pairs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedPair"
    post:
      operationId: savePair
      tags: [homophones]
      summary: Save a homophone pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavePairRequest"
      responses:
        "201":
          description: Saved pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedPair"

  /homophones/saved/{id}:
    delete:
      operationId: deleteSavedPair
      tags: [homophones]
      summary: Delete a saved pair
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteConfirmation"

  /homophones/featured:
    get:
      operationId: getFeaturedPairs
      tags: [homophones]
      summary: Get curated featured cross-lingual homophone pairs
      responses:
        "200":
          description: Featured examples
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeaturedPair"

  /homophones/languages:
    get:
      operationId: getLanguages
      tags: [homophones]
      summary: Get supported language list
      responses:
        "200":
          description: Languages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Language"

  /reservoir/pairs:
    get:
      operationId: listReservoirPairs
      tags: [reservoir]
      summary: List EN↔FR reservoir pairs (filterable)
      parameters:
        - in: query
          name: tier
          schema: { type: string, enum: [S, A, B] }
        - in: query
          name: minSim
          schema: { type: number, minimum: 0, maximum: 1 }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Reservoir rows ranked by similarity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReservoirPair"

  /reservoir/pairs/{id}:
    delete:
      operationId: deleteReservoirPair
      tags: [reservoir]
      summary: Delete one reservoir pair
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteConfirmation"

  /reservoir/stats:
    get:
      operationId: getReservoirStats
      tags: [reservoir]
      summary: Tier counts and totals for the reservoir
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservoirStats"

  /reservoir/mine/start:
    post:
      operationId: startReservoirMining
      tags: [reservoir]
      summary: Start an EN↔FR mining job
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MineStartRequest"
      responses:
        "202":
          description: Job started
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId: { type: integer }
                required: [jobId]
        "409":
          description: Already running
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                required: [error]

  /reservoir/mine/cancel:
    post:
      operationId: cancelReservoirMining
      tags: [reservoir]
      summary: Cancel the running mining job
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  jobId: { type: integer }
                required: [success, jobId]

  /reservoir/mine/status:
    get:
      operationId: getReservoirMiningStatus
      tags: [reservoir]
      summary: Latest mining job + active job id (poll every 2s)
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiningStatus"

  /flit/run:
    post:
      operationId: runFlit
      tags: [flit]
      summary: Run the Flit pipeline on an EN or FR input
      description: |
        Generates N paraphrases of the input, M target-language sound-alike
        renderings per paraphrase, scores all N×M cross-product pairs, and
        semantic-verifies the top-K finalists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlitRequest"
      responses:
        "200":
          description: Flit result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlitResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Language:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        nativeName:
          type: string
      required: [code, name, nativeName]

    ScoringMethodInfo:
      type: object
      description: A named acoustic similarity judge that can be selected per request via `scoringMethod`.
      properties:
        id:
          type: string
          description: Stable identifier (e.g. "mfcc-dtw", "wav2vec2-mean-cos", "wav2vec2-dtw")
        label:
          type: string
          description: Human-readable name
        description:
          type: string
          description: How this method judges similarity
        status:
          type: string
          enum: [ready, lazy, error]
          description: ready = usable now; lazy = will load model on first use; error = unavailable
        statusDetail:
          type: string
      required: [id, label, description, status]

    FeaturedPair:
      type: object
      properties:
        sourcePhrase:
          type: string
        sourceLanguage:
          type: string
        sourceMeaning:
          type: string
        matchPhrase:
          type: string
        matchLanguage:
          type: string
        matchMeaning:
          type: string
        description:
          type: string
      required:
        - sourcePhrase
        - sourceLanguage
        - sourceMeaning
        - matchPhrase
        - matchLanguage
        - matchMeaning
        - description

    AudioPayload:
      type: object
      description: Encoded audio + numeric features extracted server-side from raw TTS PCM
      properties:
        wavBase64:
          type: string
          description: WAV-encoded audio for browser playback
        sampleRate:
          type: integer
        durationMs:
          type: number
        waveform:
          type: array
          description: Downsampled waveform peaks for visualization
          items:
            type: number
        melSpectrogram:
          type: array
          description: Mel-spectrogram frames (rows are frames, columns are mel bins)
          items:
            type: array
            items:
              type: number
        melMin:
          type: number
        melMax:
          type: number
      required:
        - wavBase64
        - sampleRate
        - durationMs
        - waveform
        - melSpectrogram
        - melMin
        - melMax

    DiscoverRequest:
      type: object
      properties:
        phrase:
          type: string
          minLength: 1
          maxLength: 200
          description: Source phrase (single word or multi-word)
        sourceLanguage:
          type: string
          minLength: 2
          description: ISO code of source language (e.g. "en", "fr", "ja")
        targetLanguages:
          type: array
          description: Optional restriction to specific target languages
          items:
            type: string
        candidateCount:
          type: integer
          description: Number of LLM-generated candidates to evaluate
          default: 32
        minSimilarity:
          type: number
          description: Minimum acoustic similarity (0-1) to return
          default: 0.55
        scoringMethod:
          type: string
          description: Acoustic judge id (see /homophones/methods). Defaults to "mfcc-dtw".
      required:
        - phrase
        - sourceLanguage

    ComponentScore:
      type: object
      description: Sub-score from one component of a hybrid scoring method
      properties:
        id:
          type: string
        label:
          type: string
        similarity:
          type: number
        distance:
          type: number
      required: [id, label, similarity, distance]

    AcousticMatch:
      type: object
      properties:
        phrase:
          type: string
        language:
          type: string
        languageCode:
          type: string
        meaning:
          type: string
        notes:
          type: string
        similarity:
          type: number
          description: 0-1 acoustic similarity from MFCC+DTW
        dtwDistance:
          type: number
        audio:
          $ref: "#/components/schemas/AudioPayload"
        componentScores:
          type: array
          description: Per-component scores when a hybrid scoring method is used
          items:
            $ref: "#/components/schemas/ComponentScore"
      required:
        - phrase
        - language
        - languageCode
        - meaning
        - notes
        - similarity
        - dtwDistance
        - audio

    DiscoverResponse:
      type: object
      properties:
        sourcePhrase:
          type: string
        sourceLanguage:
          type: string
        sourceLanguageName:
          type: string
        sourceMeaning:
          type: string
        sourceAudio:
          $ref: "#/components/schemas/AudioPayload"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/AcousticMatch"
        candidatesEvaluated:
          type: integer
        candidatesFailed:
          type: integer
          description: Number of candidates whose TTS or feature extraction failed
        elapsedMs:
          type: number
        scoringMethod:
          type: string
        scoringMethodLabel:
          type: string
      required:
        - sourcePhrase
        - sourceLanguage
        - sourceLanguageName
        - sourceMeaning
        - sourceAudio
        - matches
        - candidatesEvaluated
        - candidatesFailed
        - elapsedMs
        - scoringMethod
        - scoringMethodLabel

    TtsRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 500
        voice:
          type: string
      required: [text]

    TtsResponse:
      type: object
      properties:
        audio:
          $ref: "#/components/schemas/AudioPayload"
      required: [audio]

    CompareRequest:
      type: object
      properties:
        phrase1:
          type: string
          minLength: 1
          maxLength: 200
        language1:
          type: string
        phrase2:
          type: string
          minLength: 1
          maxLength: 200
        language2:
          type: string
        scoringMethod:
          type: string
          description: Acoustic judge id (see /homophones/methods). Defaults to "mfcc-dtw".
      required: [phrase1, phrase2]

    CompareResponse:
      type: object
      properties:
        phrase1:
          type: string
        phrase2:
          type: string
        audio1:
          $ref: "#/components/schemas/AudioPayload"
        audio2:
          $ref: "#/components/schemas/AudioPayload"
        similarity:
          type: number
        dtwDistance:
          type: number
        verdict:
          type: string
        scoringMethod:
          type: string
        scoringMethodLabel:
          type: string
        componentScores:
          type: array
          description: Per-component scores when a hybrid scoring method is used
          items:
            $ref: "#/components/schemas/ComponentScore"
      required:
        - phrase1
        - phrase2
        - audio1
        - audio2
        - similarity
        - dtwDistance
        - verdict
        - scoringMethod
        - scoringMethodLabel

    TranslatePassageRequest:
      type: object
      properties:
        passage:
          type: string
          minLength: 1
          maxLength: 4000
          description: Source passage (any length up to 4000 chars; chunked internally)
        sourceLanguage:
          type: string
          minLength: 2
        targetLanguage:
          type: string
          minLength: 2
        candidatesPerChunk:
          type: integer
          minimum: 1
          maximum: 4
          default: 2
          description: Number of homophonic candidates to generate and rank per chunk
        maxChunks:
          type: integer
          minimum: 1
          maximum: 40
          default: 30
          description: Hard cap on chunk count (excess chunks are dropped with a warning)
        scoringMethod:
          type: string
          description: Acoustic judge id (see /homophones/methods). Defaults to "mfcc-dtw".
      required:
        - passage
        - sourceLanguage
        - targetLanguage

    TranslatedChunk:
      type: object
      properties:
        index:
          type: integer
        sourceText:
          type: string
        semanticTranslation:
          type: string
          description: Literal meaning-preserving translation in the target language
        homophonic:
          type: string
          description: Best target-language phrase that sounds like the source chunk
        homophonicGloss:
          type: string
          description: Literal English meaning of the homophonic rendering (often nonsense)
        similarity:
          type: number
          description: Acoustic similarity (0-1) of best homophonic candidate vs source
        dtwDistance:
          type: number
        sourceAudio:
          $ref: "#/components/schemas/AudioPayload"
        homophonicAudio:
          $ref: "#/components/schemas/AudioPayload"
        alternatives:
          type: array
          description: Other homophonic candidates considered, ranked by similarity (excluding the chosen one)
          items:
            type: object
            properties:
              phrase:
                type: string
              gloss:
                type: string
              similarity:
                type: number
            required: [phrase, gloss, similarity]
        componentScores:
          type: array
          description: Per-component scores when a hybrid scoring method is used (best-candidate only)
          items:
            $ref: "#/components/schemas/ComponentScore"
        error:
          type: string
          description: Set if this chunk failed to process
      required:
        - index
        - sourceText
        - semanticTranslation
        - homophonic
        - homophonicGloss
        - similarity
        - dtwDistance
        - alternatives

    TranslatedPassage:
      type: object
      properties:
        sourceLanguage:
          type: string
        sourceLanguageName:
          type: string
        targetLanguage:
          type: string
        targetLanguageName:
          type: string
        chunks:
          type: array
          items:
            $ref: "#/components/schemas/TranslatedChunk"
        chunksAttempted:
          type: integer
        chunksFailed:
          type: integer
        chunksDropped:
          type: integer
          description: Chunks dropped because they exceeded maxChunks
        averageSimilarity:
          type: number
        elapsedMs:
          type: number
        scoringMethod:
          type: string
          description: Id of the acoustic judge used for ranking
        scoringMethodLabel:
          type: string
      required:
        - sourceLanguage
        - sourceLanguageName
        - targetLanguage
        - targetLanguageName
        - chunks
        - chunksAttempted
        - chunksFailed
        - chunksDropped
        - averageSimilarity
        - elapsedMs
        - scoringMethod
        - scoringMethodLabel

    SavePairRequest:
      type: object
      properties:
        sourcePhrase:
          type: string
        sourceLanguage:
          type: string
        sourceMeaning:
          type: string
        matchPhrase:
          type: string
        matchLanguage:
          type: string
        matchMeaning:
          type: string
        similarity:
          type: number
        notes:
          type: string
      required:
        - sourcePhrase
        - sourceLanguage
        - sourceMeaning
        - matchPhrase
        - matchLanguage
        - matchMeaning
        - similarity

    SavedPair:
      type: object
      properties:
        id:
          type: integer
        sourcePhrase:
          type: string
        sourceLanguage:
          type: string
        sourceMeaning:
          type: string
        matchPhrase:
          type: string
        matchLanguage:
          type: string
        matchMeaning:
          type: string
        similarity:
          type: number
        notes:
          type: string
        createdAt:
          type: string
      required:
        - id
        - sourcePhrase
        - sourceLanguage
        - sourceMeaning
        - matchPhrase
        - matchLanguage
        - matchMeaning
        - similarity
        - createdAt

    DeleteConfirmation:
      type: object
      properties:
        success:
          type: boolean
        id:
          type: integer
      required: [success, id]

    ReservoirComponentScore:
      type: object
      properties:
        id: { type: string }
        label: { type: string }
        similarity: { type: number }
        distance: { type: number }
      required: [id, label, similarity, distance]

    ReservoirPair:
      type: object
      properties:
        id: { type: integer }
        enPhrase: { type: string }
        frPhrase: { type: string }
        enGloss: { type: string }
        frGloss: { type: string }
        similarity: { type: number }
        enCoherence: { type: integer }
        frCoherence: { type: integer }
        tier: { type: string, enum: [S, A, B] }
        source: { type: string }
        seed: { type: string }
        rationale: { type: string }
        componentScores:
          type: array
          items:
            $ref: "#/components/schemas/ReservoirComponentScore"
        createdAt: { type: string }
      required:
        - id
        - enPhrase
        - frPhrase
        - enGloss
        - frGloss
        - similarity
        - enCoherence
        - frCoherence
        - tier
        - source
        - seed
        - rationale
        - componentScores
        - createdAt

    ReservoirStats:
      type: object
      properties:
        total: { type: integer }
        target: { type: integer }
        tierCounts:
          type: object
          properties:
            S: { type: integer }
            A: { type: integer }
            B: { type: integer }
          required: [S, A, B]
        averageSimilarity: { type: number }
        seedCount: { type: integer }
      required: [total, target, tierCounts, averageSimilarity, seedCount]

    MineStartRequest:
      type: object
      properties:
        maxSeeds: { type: integer, minimum: 1, maximum: 1000 }

    MiningJob:
      type: object
      properties:
        id: { type: integer }
        status: { type: string }
        startedAt: { type: string }
        finishedAt: { type: string, nullable: true }
        totalsAttempted: { type: integer }
        totalsInserted: { type: integer }
        totalsSkipped: { type: integer }
        totalsFailed: { type: integer }
        tierCounts:
          type: object
          properties:
            S: { type: integer }
            A: { type: integer }
            B: { type: integer }
          required: [S, A, B]
        currentSeed: { type: string }
        lastError: { type: string }
      required:
        - id
        - status
        - startedAt
        - totalsAttempted
        - totalsInserted
        - totalsSkipped
        - totalsFailed
        - tierCounts
        - currentSeed
        - lastError

    MiningStatus:
      type: object
      properties:
        activeJobId:
          type: integer
          nullable: true
        job:
          allOf:
            - $ref: "#/components/schemas/MiningJob"
          nullable: true
      required: [activeJobId]

    FlitRequest:
      type: object
      properties:
        text: { type: string, minLength: 1, maxLength: 500 }
        language: { type: string, enum: [en, fr] }
        inputParaphrases: { type: integer, minimum: 1, maximum: 8, default: 6 }
        targetRenderings: { type: integer, minimum: 1, maximum: 6, default: 4 }
        topK: { type: integer, minimum: 1, maximum: 8, default: 5 }
      required: [text, language]

    FlitParaphrase:
      type: object
      properties:
        text: { type: string }
        gloss: { type: string }
      required: [text, gloss]

    FlitCandidate:
      type: object
      properties:
        inputParaphrase: { type: string }
        inputParaphraseGloss: { type: string }
        targetText: { type: string }
        targetGloss: { type: string }
        similarity: { type: number }
        componentScores:
          type: array
          items:
            $ref: "#/components/schemas/ReservoirComponentScore"
        semanticOK: { type: boolean }
        semanticNote: { type: string }
      required:
        - inputParaphrase
        - inputParaphraseGloss
        - targetText
        - targetGloss
        - similarity
        - componentScores
        - semanticOK
        - semanticNote

    FlitResponse:
      type: object
      properties:
        inputLanguage: { type: string, enum: [en, fr] }
        targetLanguage: { type: string, enum: [en, fr] }
        inputText: { type: string }
        inputMeaning: { type: string }
        inputParaphrases:
          type: array
          items:
            $ref: "#/components/schemas/FlitParaphrase"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/FlitCandidate"
        best:
          allOf:
            - $ref: "#/components/schemas/FlitCandidate"
          nullable: true
        attempted: { type: integer }
        elapsedMs: { type: number }
      required:
        - inputLanguage
        - targetLanguage
        - inputText
        - inputMeaning
        - inputParaphrases
        - candidates
        - attempted
        - elapsedMs
