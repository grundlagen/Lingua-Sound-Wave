# Worker pool for the Fugu-style orchestrator.
#
# The coordinator (TRINITY router / Conductor) assigns roles to these workers.
# Routing is via litellm, so any litellm-supported provider works.
#
# Two regimes (see README):
#   - Frontier API workers  -> real Fugu-quality, costs per call.
#   - Local Ollama workers   -> fully local / Termux-friendly, small-model quality.
# Mix them: cheap local model as Worker, frontier model as Verifier, etc.

coordinator:
  # "trinity" = ~19.5K-param router, trained locally, negligible RAM (best for Termux).
  # "conductor" = 3B weights from pull-weights.sh (needs ~6 GB, not for phones).
  type: trinity
  conductor_weights: ./.fugu/weights/openfugu-conductor-3b

# Bounded recursive retry: if the Verifier's confidence is below threshold,
# spawn one corrective pass. Cap depth or costs run away.
control:
  verify: true
  verify_confidence_threshold: 0.7
  max_retry_depth: 2
  default_topology: single        # single | sequential | parallel | debate
  # Reserve "debate" (fan-out across frontier models) for contested, high-value
  # calls only — it multiplies API spend per query.

workers:
  # --- Local, fully offline (Ollama). Start with `ollama serve`. ---
  - name: local-llama
    model: ollama/llama3.1:8b
    roles: [thinker, worker, verifier]
    api_base: http://localhost:11434

  - name: local-deepseek
    model: ollama/deepseek-r1:7b
    roles: [thinker, worker]
    api_base: http://localhost:11434

  # --- Frontier API workers (uncomment + set keys via env). Costs per call. ---
  # - name: claude
  #   model: anthropic/claude-opus-4-8        # set ANTHROPIC_API_KEY
  #   roles: [thinker, verifier]              # strong model verifies cheap output
  #
  # - name: gpt
  #   model: openai/gpt-5.5                    # set OPENAI_API_KEY
  #   roles: [worker, verifier]
  #
  # - name: gemini
  #   model: gemini/gemini-3.1-pro             # set GEMINI_API_KEY
  #   roles: [thinker, worker]

server:
  host: 0.0.0.0
  port: 8000
  served_model_name: fugu          # clients call this as a single model
