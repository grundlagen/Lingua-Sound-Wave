name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install pnpm
        run: npm install -g pnpm@latest
      - name: Install deps
        run: pnpm install
      - name: Typecheck
        run: pnpm run typecheck --if-present
      - name: Build
        run: pnpm run build --if-present
